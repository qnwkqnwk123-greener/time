<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>마이 파스텔 플래너 ✨</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  /* 🎨 세련되고 귀여운 파스텔 톤 색상 변수 */
  :root {
    --primary: #818cf8;       /* 소프트 인디고 */
    --primary-hover: #6366f1;
    --border-color: #e2e8f0;
    --text-main: #334155;
    --text-muted: #94a3b8;
    --success: #34d399;       /* 민트 그린 */
    --success-bg: #ecfdf5;
    --done-bg: #fdf2f8;
    --done-color: #f472b6;    /* 파스텔 핑크 */
    --bg-color: #f8fafc;
    --shadow: 0 10px 15px -3px rgba(129, 140, 248, 0.1), 0 4px 6px -2px rgba(129, 140, 248, 0.05);
  }
  
  * { box-sizing: border-box; font-family: 'Pretendard', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { color: var(--text-main); background: var(--bg-color); padding: 15px; margin: 0; line-height: 1.5; }
  
  /* 둥글둥글한 버튼 스타일 */
  button {
    padding: 10px 16px; border: 1px solid var(--border-color); background: white; 
    border-radius: 20px; cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 600;
  }
  button:hover { background: #f1f5f9; transform: translateY(-1px); }
  .btn-primary { background: var(--primary); color: white; border: none; box-shadow: 0 4px 6px rgba(129, 140, 248, 0.3); }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-danger { background: #fee2e2; color: #ef4444; border: 1px solid #fca5a5; padding: 8px 12px; border-radius: 12px;}
  .hidden { display: none !important; }

  /* 📅 캘린더 뷰 (모바일 대응 Grid) */
  .cal-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 10px; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  @media (min-width: 600px) { .calendar-grid { gap: 10px; } }
  .day-name { text-align: center; font-weight: bold; color: var(--text-muted); padding-bottom: 5px; font-size: 14px; }
  
  .cal-day {
    padding: 10px 5px; text-align: center; cursor: pointer; border-radius: 16px; font-size: 14px;
    border: 1px solid var(--border-color); background: white; transition: all 0.2s; min-height: 80px;
    display: flex; flex-direction: column; gap: 4px; align-items: center;
  }
  .cal-day:hover { background: #eef2ff; border-color: var(--primary); transform: translateY(-3px); box-shadow: var(--shadow); }
  .cal-day.today { border: 2px solid var(--done-color); background: #fff1f2; }
  
  .sun { color: #f87171; font-weight: bold; }
  .sat { color: #60a5fa; font-weight: bold; }
  .holiday-text { color: #ef4444; font-size: 10px; font-weight: bold; background: #fee2e2; padding: 2px 4px; border-radius: 4px; }
  .event-text { color: var(--primary); font-size: 10px; background: #e0e7ff; padding: 2px 4px; border-radius: 4px; white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
  .priority-text { color: var(--success); font-size: 10px; background: var(--success-bg); padding: 2px 4px; border-radius: 4px; white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis; }

  /* 📝 플래너 뷰 레이아웃 (반응형 1단 -> 2단) */
  .planner-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 20px; border-radius: 20px; box-shadow: var(--shadow); gap: 10px; }
  .kpi-board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
  @media (min-width: 768px) { .kpi-board { grid-template-columns: repeat(4, 1fr); } }
  
  .kpi-card { background: white; border: 1px solid var(--border-color); border-radius: 16px; padding: 15px; text-align: center; box-shadow: var(--shadow); }
  .kpi-card h3 { margin: 0 0 5px 0; font-size: 13px; color: var(--text-muted); font-weight: normal; }
  .kpi-card .value { font-size: 22px; font-weight: bold; margin: 0; color: var(--text-main); }
  
  .planner-body { display: grid; grid-template-columns: 1fr; gap: 20px; }
  @media (min-width: 900px) { .planner-body { grid-template-columns: 2fr 1fr; } } /* PC에서는 2단 */
  
  .box-panel { background: white; border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .box-title { font-size: 16px; font-weight: bold; margin-top: 0; margin-bottom: 15px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; border-bottom: 2px dashed var(--border-color); padding-bottom: 10px; gap: 10px; }

  /* ⏳ 24시간 집중 타이머 영역 */
  .timer-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 15px; }
  @media (max-width: 500px) { .timer-grid { grid-template-columns: repeat(4, 1fr); } }
  .timer-chip { padding: 6px 0; font-size: 13px; border-radius: 10px; background: #f1f5f9; color: var(--text-muted); border: 1px solid var(--border-color); text-align: center; transition: all 0.2s; }
  .timer-chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 8px rgba(129,140,248,0.4); transform: scale(1.05); }
  .timer-chip.done { background: var(--success-bg); color: var(--success); text-decoration: line-through; border-color: #a7f3d0; }
  
  .timer-display { text-align: center; background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid var(--border-color); }
  .timer-title { font-size: 14px; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
  .timer-time { font-size: 48px; font-weight: 800; color: var(--text-main); font-variant-numeric: tabular-nums; margin-bottom: 15px; letter-spacing: 2px; }
  .timer-controls { display: flex; gap: 8px; justify-content: center; }

  /* 🕒 타임테이블 */
  .time-settings { display: flex; gap: 5px; align-items: center; font-size: 12px; color: var(--text-muted); }
  .time-settings input { width: 45px; padding: 6px; border: 1px solid var(--border-color); border-radius: 8px; text-align: center; }
  
  .time-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; gap: 8px; }
  .time-label { width: 55px; font-size: 13px; font-weight: bold; color: var(--primary); text-align: center; flex-shrink: 0; }
  .time-input { flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 12px; outline: none; transition: all 0.2s; font-size: 14px; min-width: 0; }
  .time-input:focus { border-color: var(--primary); background: #fbfbfe; }
  .time-input.done-input { background: var(--done-bg); color: #9ca3af; text-decoration: line-through; border-color: #fbcfe8; }
  
  .status-btn { width: 75px; padding: 10px 0; font-size: 12px; border-radius: 20px; background: #f1f5f9; color: var(--text-muted); flex-shrink: 0; border: none; }
  .status-btn.done { background: var(--done-color); color: white; box-shadow: 0 4px 6px rgba(244, 114, 182, 0.3); }

  /* 우측 위젯들 */
  .priority-list, .finance-list { display: flex; flex-direction: column; gap: 10px; }
  .priority-item input, .finance-item select, .finance-item input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 12px; box-sizing: border-box; font-size: 14px; }
  
  .finance-item { display: flex; gap: 6px; flex-wrap: wrap; }
  @media (min-width: 400px) { .finance-item { flex-wrap: nowrap; } } /* 아주 좁을때만 줄바꿈 */
  .finance-item select { flex: 1; min-width: 70px; }
  .finance-item input.desc { flex: 2; min-width: 100px; }
  .finance-item input.amt { flex: 1.5; text-align: right; min-width: 80px; }
  
  .chart-container, .finance-chart-container { position: relative; height: 180px; width: 100%; margin: 15px 0; }
  
  .growth-stats { display: flex; justify-content: space-around; margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 12px; }
  .growth-stat-item { text-align: center; }
  .growth-stat-item .label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
  .growth-stat-item .val { font-size: 18px; font-weight: bold; }
  
  .feedback-message { background: var(--success-bg); color: var(--success); padding: 12px; border-radius: 12px; font-size: 14px; font-weight: bold; text-align: center; }

  /* 토스트 알림 */
  #toastContainer {
    visibility: hidden; min-width: 250px; background-color: rgba(51, 65, 85, 0.9); color: #fff; text-align: center; border-radius: 20px;
    padding: 12px 20px; position: fixed; z-index: 1000; left: 50%; bottom: 40px; transform: translateX(-50%);
    opacity: 0; transition: opacity 0.3s, visibility 0.3s; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }
  #toastContainer.show { visibility: visible; opacity: 1; }
</style>
</head>
<body>

  <div id="calendarView">
    <div class="cal-header">
      <h2 style="margin:0;">📅 마이 파스텔 플래너 ✨</h2>
      <div style="display: flex; align-items: center; gap: 10px;">
        <button onclick="app.ui.changeMonth(-1)">◀</button>
        <span id="currentMonthStr" style="font-weight: 800; font-size: 18px; color: var(--primary);"></span>
        <button onclick="app.ui.changeMonth(1)">▶</button>
      </div>
    </div>
    
    <div class="calendar-grid">
      <div class="day-name sun">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div>
      <div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div>
      <div class="day-name sat">Sat</div>
    </div>
    <div class="calendar-grid" id="calendarDays"></div>
  </div>

  <div id="plannerView" class="hidden">
    <div style="margin-bottom: 15px;">
      <button onclick="app.ui.showCalendar()" style="background: white; color: var(--text-main);">🏠 캘린더로 돌아가기</button>
    </div>
    
    <div class="planner-header">
      <h2 style="margin:0; color: var(--primary);" id="plannerTitle">📝 데일리 플래너</h2>
      <div style="display: flex; gap: 8px;">
        <button onclick="app.exportCSV()">📥 CSV 다운</button>
        <button class="btn-primary" onclick="app.saveDailyData()">💾 저장</button>
      </div>
    </div>

    <div class="kpi-board">
      <div class="kpi-card"><h3>🔥 달성률</h3><p class="value" id="kpiProgress">0%</p></div>
      <div class="kpi-card"><h3>💸 총 지출</h3><p class="value" id="kpiExpenditure">₩0</p></div>
      <div class="kpi-card"><h3>☁️ 하늘 점수</h3><p class="value" id="kpiScore" style="color: var(--primary);">0점</p></div>
      <div class="kpi-card"><h3>🔔 알람</h3><p class="value" style="color:var(--done-color); font-size:16px; margin-top:5px;">활성화됨</p></div>
    </div>

    <div class="planner-body">
      <div class="left-col">
        
        <div class="box-panel">
          <h3 class="box-title">
            <span>⏳ 24시간 집중 타이머 <span style="font-size: 12px; font-weight: normal; color: var(--text-muted);">(40분 집중/20분 휴식)</span></span>
          </h3>
          <div class="timer-grid" id="timerGrid">
            </div>
          <div class="timer-display">
            <div class="timer-title" id="timerTitle">원하는 시간대를 선택해주세요 👆</div>
            <div class="timer-time" id="timerTime">00:00</div>
            <div class="timer-controls">
              <button class="btn-primary" onclick="app.timer.start()">▶ 시작</button>
              <button onclick="app.timer.pause()">⏸ 정지</button>
              <button class="btn-danger" onclick="app.timer.reset()">⏹ 초기화</button>
            </div>
          </div>
        </div>

        <div class="box-panel">
          <div class="box-title">
            <span>🕒 유연한 타임테이블</span>
            <div class="time-settings">
              시작 <input type="number" id="timeStart" value="6" min="0" max="23"> 
              종료 <input type="number" id="timeEnd" value="24" min="1" max="24">
              <button onclick="app.ui.updateTimetableRange()" style="padding:6px 10px;">적용</button>
            </div>
          </div>
          <div id="timetableContainer"></div>
        </div>
      </div>

      <div class="right-col">
        <div class="box-panel">
          <h3 class="box-title">🎯 핵심 우선순위 (Top 3)</h3>
          <div class="priority-list">
            <div class="priority-item"><input type="text" id="pri1" placeholder="🥇 1순위 목표" onchange="app.saveDailyData()"></div>
            <div class="priority-item"><input type="text" id="pri2" placeholder="🥈 2순위 목표" onchange="app.saveDailyData()"></div>
            <div class="priority-item"><input type="text" id="pri3" placeholder="🥉 3순위 목표" onchange="app.saveDailyData()"></div>
          </div>
        </div>

        <div class="box-panel">
          <h3 class="box-title">🎉 기념일 추가</h3>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="eventTitle" placeholder="예: 생일🎂" style="flex: 1; padding: 10px; border: 1px solid var(--border-color); border-radius: 12px;">
            <button class="btn-primary" onclick="app.addEventToCurrentDate()">추가</button>
          </div>
        </div>

        <div class="box-panel">
          <h3 class="box-title">
            💰 지출 내역
            <button onclick="app.ui.addFinanceRow()">➕ 추가</button>
          </h3>
          <div class="finance-list" id="financeList"></div>
          <div class="finance-chart-container"><canvas id="financeChart"></canvas></div>
        </div>

        <div class="box-panel">
          <h3 class="box-title">📈 성장 리포트</h3>
          <div class="growth-stats">
            <div class="growth-stat-item"><div class="label">지난주 🕰️</div><div class="val" id="reportLastWeek">0%</div></div>
            <div class="growth-stat-item"><div class="label">어제 🔙</div><div class="val" id="reportYesterday">0%</div></div>
            <div class="growth-stat-item"><div class="label">오늘 🌟</div><div class="val" id="reportToday" style="color: var(--primary);">0%</div></div>
          </div>
          <div class="chart-container"><canvas id="growthChart"></canvas></div>
          <div id="growthFeedback" class="feedback-message"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer">저장되었습니다.</div>

<script>
  const app = {
    currentDate: new Date(),       
    selectedDateStr: "",           
    events: JSON.parse(localStorage.getItem('appEvents')) || [], 
    dailyData: JSON.parse(localStorage.getItem('appDailyData')) || {}, 
    settings: JSON.parse(localStorage.getItem('appSettings')) || { start: 6, end: 24 },
    holidays: {},
    growthChartInstance: null,
    financeChartInstance: null,
    alarmTriggered: {}, 
    
    init() {
      this.fetchHolidays(this.currentDate.getFullYear()).then(() => {
        this.ui.renderCalendar();
      });

      if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
        Notification.requestPermission();
      }

      setInterval(() => this.checkAlarms(), 60000);
    },

    async fetchHolidays(year) {
      if (this.holidays[year]) return; 
      try {
        const response = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/KR`);
        const data = await response.json();
        this.holidays[year] = data.reduce((acc, curr) => {
          acc[curr.date] = curr.localName; return acc;
        }, {});
      } catch (error) {
        console.error('공휴일 데이터 연동 실패', error);
      }
    },

    checkAlarms() {
      if ("Notification" in window && Notification.permission === "granted") {
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        const currentHour = now.getHours();
        
        const todayData = this.dailyData[todayStr];
        if (!todayData || !todayData.timetable || !todayData.timetable[currentHour]) return;

        const task = todayData.timetable[currentHour];
        if (task.text.trim() !== "" && !task.done && !this.alarmTriggered[todayStr + currentHour]) {
          new Notification("🔔 플래너 일정 알림", {
            body: `${currentHour}시 일정: "${task.text}" (달성 후 완료 체크해주세요!)`,
          });
          this.alarmTriggered[todayStr + currentHour] = true; 
        }
      }
    },

    addEventToCurrentDate() {
      const title = document.getElementById('eventTitle').value.trim();
      if (!title) return this.ui.showToast('일정 이름을 입력해주세요. 😅');
      
      this.events.push({ date: this.selectedDateStr, title: title });
      localStorage.setItem('appEvents', JSON.stringify(this.events));
      document.getElementById('eventTitle').value = '';
      this.ui.showToast('기념일이 귀엽게 추가되었습니다! 🎉');
      this.ui.renderCalendar();
    },

    saveDailyData(showToast = true) {
      const p1 = document.getElementById('pri1').value;
      const p2 = document.getElementById('pri2').value;
      const p3 = document.getElementById('pri3').value;
      
      const timetableData = {};
      document.querySelectorAll('.time-row').forEach(row => {
        const hour = parseInt(row.dataset.hour);
        timetableData[hour] = {
          text: row.querySelector('.time-input').value,
          done: row.querySelector('.status-btn').classList.contains('done')
        };
      });
      
      const finances = Array.from(document.querySelectorAll('.finance-item')).map(row => {
        return {
          category: row.querySelector('.cat').value,
          desc: row.querySelector('.desc').value,
          amount: Number(row.querySelector('.amt').value) || 0
        };
      });

      const plannedTasks = Object.values(timetableData).filter(t => t.text.trim() !== "");
      const completedTasks = plannedTasks.filter(t => t.done);
      const currentProgress = plannedTasks.length > 0 ? Math.round((completedTasks.length / plannedTasks.length) * 100) : 0;

      // 기존 타이머 데이터 보존
      const existingTimers = (this.dailyData[this.selectedDateStr] && this.dailyData[this.selectedDateStr].timers) || {};

      this.dailyData[this.selectedDateStr] = {
        priorities: [p1, p2, p3],
        timetable: timetableData,
        finances: finances,
        timers: existingTimers,
        progress: currentProgress 
      };
      localStorage.setItem('appDailyData', JSON.stringify(this.dailyData));
      
      this.ui.calculateExpenditure();
      this.ui.updateGrowthReport(); 
      if(showToast) this.ui.showToast('데이터가 성공적으로 저장되었습니다. 💾');
    },

    exportCSV() {
      let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
      csvContent += "Date,Progress(%),Total Expense,Priority 1,Priority 2,Priority 3\n";
      
      Object.keys(this.dailyData).sort().forEach(date => {
        const d = this.dailyData[date];
        const totalExp = d.finances ? d.finances.reduce((sum, item) => sum + item.amount, 0) : 0;
        const p1 = d.priorities[0] ? d.priorities[0].replace(/,/g, '') : "";
        const p2 = d.priorities[1] ? d.priorities[1].replace(/,/g, '') : "";
        const p3 = d.priorities[2] ? d.priorities[2].replace(/,/g, '') : "";
        
        csvContent += `${date},${d.progress||0},${totalExp},${p1},${p2},${p3}\n`;
      });
      
      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "pastel_planner_backup.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      this.ui.showToast('데이터가 CSV로 다운로드 되었습니다! 📥');
    },
    
    getOffsetDateString(baseDateStr, offsetDays) {
      const date = new Date(baseDateStr);
      date.setDate(date.getDate() - offsetDays);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    },

    // ⏳ 타이머 객체 추가
    timer: {
      activeHour: null,
      mode: 'study', // 'study' (40분) 또는 'rest' (20분)
      timeLeft: 40 * 60, // 초기값 40분 (초 단위)
      interval: null,
      isRunning: false,
      
      init() {
        this.renderGrid();
        this.updateDisplay();
      },
      
      renderGrid() {
        const grid = document.getElementById('timerGrid');
        grid.innerHTML = '';
        const timersData = (app.dailyData[app.selectedDateStr] && app.dailyData[app.selectedDateStr].timers) || {};
        
        for(let i = 0; i < 24; i++) {
          const btn = document.createElement('button');
          btn.className = 'timer-chip';
          btn.textContent = `${i}시`;
          
          if (this.activeHour === i) btn.classList.add('active');
          if (timersData[i] === 'done') btn.classList.add('done');
          
          btn.onclick = () => this.selectHour(i);
          grid.appendChild(btn);
        }
      },
      
      selectHour(hour) {
        this.pause();
        this.activeHour = hour;
        this.mode = 'study';
        this.timeLeft = 40 * 60;
        this.renderGrid(); // active 클래스 갱신
        this.updateDisplay();
      },
      
      start() {
        if(this.activeHour === null) return app.ui.showToast('먼저 위에서 시간대(0~23시)를 선택해주세요! 👆');
        if(this.isRunning) return;
        
        this.isRunning = true;
        this.interval = setInterval(() => {
          if(this.timeLeft > 0) {
            this.timeLeft--;
            this.updateDisplay();
          } else {
            this.switchMode();
          }
        }, 1000);
      },
      
      pause() {
        this.isRunning = false;
        clearInterval(this.interval);
      },
      
      reset() {
        if(this.activeHour === null) return;
        this.pause();
        this.mode = 'study';
        this.timeLeft = 40 * 60;
        this.updateDisplay();
      },
      
      switchMode() {
        this.pause();
        // 알림 전송
        if ("Notification" in window && Notification.permission === "granted") {
          new Notification(this.mode === 'study' ? "🎉 집중 완료!" : "🔔 휴식 끝!", {
            body: this.mode === 'study' ? "40분 집중 완료! 20분 휴식을 시작하세요." : "20분 휴식 종료! 한 시간 세션이 완료되었습니다."
          });
        }

        if(this.mode === 'study') {
          app.ui.showToast('🎉 40분 집중 완료! 달콤한 20분 휴식을 시작하세요 ☕');
          this.mode = 'rest';
          this.timeLeft = 20 * 60;
          // 자동으로 타이머 시작하지 않고 사용자가 누르도록 대기
          this.updateDisplay();
        } else {
          app.ui.showToast('✅ 1시간 세션 완료! 너무 수고하셨습니다 👏');
          
          // 해당 시간을 완료(done) 처리하여 데이터에 저장
          if (!app.dailyData[app.selectedDateStr]) app.dailyData[app.selectedDateStr] = { timers: {} };
          if (!app.dailyData[app.selectedDateStr].timers) app.dailyData[app.selectedDateStr].timers = {};
          
          app.dailyData[app.selectedDateStr].timers[this.activeHour] = 'done';
          app.saveDailyData(false); // 로컬 스토리지 업데이트
          
          this.activeHour = null;
          this.renderGrid();
          this.updateDisplay();
        }
      },
      
      updateDisplay() {
        const titleEl = document.getElementById('timerTitle');
        const timeEl = document.getElementById('timerTime');
        
        if(this.activeHour === null) {
          titleEl.textContent = '원하는 시간대를 선택해주세요 👆';
          titleEl.style.color = 'var(--text-muted)';
          timeEl.textContent = '00:00';
          return;
        }
        
        if (this.mode === 'study') {
          titleEl.innerHTML = `<span style="color:#ef4444;">[${this.activeHour}시]</span> 🔥 40분 집중 모드`;
        } else {
          titleEl.innerHTML = `<span style="color:#3b82f6;">[${this.activeHour}시]</span> ☕ 20분 휴식 모드`;
        }
        
        const m = String(Math.floor(this.timeLeft / 60)).padStart(2, '0');
        const s = String(this.timeLeft % 60).padStart(2, '0');
        timeEl.textContent = `${m}:${s}`;
      }
    },

    ui: {
      showToast(msg) {
        const toast = document.getElementById("toastContainer");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
      },

      changeMonth(offset) {
        app.currentDate.setMonth(app.currentDate.getMonth() + offset);
        app.fetchHolidays(app.currentDate.getFullYear()).then(() => this.renderCalendar());
      },

      showPlanner(dateStr) {
        app.selectedDateStr = dateStr;
        document.getElementById('calendarView').classList.add('hidden');
        document.getElementById('plannerView').classList.remove('hidden');
        document.getElementById('plannerTitle').textContent = `📝 ${dateStr.split('-')[1]}월 ${dateStr.split('-')[2]}일 플래너`;
        this.loadPlannerData();
        window.scrollTo(0, 0); // 화면 최상단 이동
      },

      showCalendar() {
        // 타이머가 돌고있다면 멈춤
        app.timer.pause(); 
        document.getElementById('plannerView').classList.add('hidden');
        document.getElementById('calendarView').classList.remove('hidden');
        this.renderCalendar();
      },

      updateTimetableRange() {
        const start = parseInt(document.getElementById('timeStart').value);
        const end = parseInt(document.getElementById('timeEnd').value);
        if(start >= end) return this.showToast("시작 시간이 종료 시간보다 작아야 합니다.");
        app.settings.start = start; app.settings.end = end;
        localStorage.setItem('appSettings', JSON.stringify(app.settings));
        
        app.saveDailyData(false); 
        this.loadPlannerData();
        this.showToast("타임테이블 시간이 변경되었습니다. 🕒");
      },

      toggleTimeStatus(btn) {
        const input = btn.previousElementSibling;
        if (input.value.trim() === "") return app.ui.showToast('일정을 먼저 입력해주세요! ✍️');
        
        btn.classList.toggle('done');
        if (btn.classList.contains('done')) {
          btn.textContent = '💖 달성'; input.classList.add('done-input');
        } else {
          btn.textContent = '🤍 대기'; input.classList.remove('done-input');
        }
        app.saveDailyData(false); 
      },

      loadPlannerData() {
        const data = app.dailyData[app.selectedDateStr] || { priorities: ["","",""], timetable: {}, finances: [], timers: {}, progress: 0 };
        
        document.getElementById('pri1').value = data.priorities[0] || "";
        document.getElementById('pri2').value = data.priorities[1] || "";
        document.getElementById('pri3').value = data.priorities[2] || "";
        document.getElementById('timeStart').value = app.settings.start;
        document.getElementById('timeEnd').value = app.settings.end;
        
        const tContainer = document.getElementById('timetableContainer');
        tContainer.innerHTML = '';
        for(let i = app.settings.start; i <= app.settings.end; i++) {
          const timeStr = `${String(i).padStart(2, '0')}:00`;
          const task = data.timetable[i] || { text: "", done: false };
          const doneClass = task.done ? "done" : "";
          const doneInputClass = task.done ? "done-input" : "";
          const btnText = task.done ? "💖 달성" : "🤍 대기";

          tContainer.innerHTML += `
            <div class="time-row" data-hour="${i}">
              <div class="time-label">${timeStr}</div>
              <input type="text" class="time-input ${doneInputClass}" value="${task.text}" placeholder="어떤 일정이 있나요? ✍️" onchange="app.saveDailyData()">
              <button class="status-btn ${doneClass}" onclick="app.ui.toggleTimeStatus(this)">${btnText}</button>
            </div>
          `;
        }

        const fContainer = document.getElementById('financeList');
        fContainer.innerHTML = '';
        if(!data.finances || data.finances.length === 0) this.addFinanceRow();
        else {
          data.finances.forEach(f => this.addFinanceRow(f.category, f.desc, f.amount));
        }
        
        this.calculateExpenditure();
        this.updateGrowthReport(); 
        app.timer.init(); // 타이머 초기화 (그리드 및 디스플레이 리렌더링)
      },

      addFinanceRow(category = "식비", desc = "", amount = "") {
        const fContainer = document.getElementById('financeList');
        const div = document.createElement('div');
        div.className = 'finance-item';
        
        const options = ['식비', '교통비', '쇼핑', '자기계발', '기타'].map(opt => 
          `<option value="${opt}" ${category === opt ? 'selected' : ''}>${opt}</option>`
        ).join('');

        div.innerHTML = `
          <select class="cat" onchange="app.saveDailyData()">${options}</select>
          <input type="text" class="desc" placeholder="내용" value="${desc}" onchange="app.saveDailyData()">
          <input type="number" class="amt" placeholder="금액" value="${amount}" oninput="app.ui.calculateExpenditure()" onchange="app.saveDailyData()">
          <button class="btn-danger" onclick="this.parentElement.remove(); app.ui.calculateExpenditure(); app.saveDailyData();">❌</button>
        `;
        fContainer.appendChild(div);
      },

      calculateExpenditure() {
        const amounts = document.querySelectorAll('.finance-item .amt');
        const cats = document.querySelectorAll('.finance-item .cat');
        
        let total = 0;
        let categorySums = { '식비':0, '교통비':0, '쇼핑':0, '자기계발':0, '기타':0 };

        amounts.forEach((input, index) => {
          const val = Number(input.value) || 0;
          total += val;
          if (cats[index]) categorySums[cats[index].value] += val;
        });

        document.getElementById('kpiExpenditure').textContent = `₩${total.toLocaleString()}`;
        
        const data = app.dailyData[app.selectedDateStr];
        const progress = data && data.progress !== undefined ? data.progress : 0;
        document.getElementById('kpiProgress').textContent = progress + '%';
        const score = Math.floor(progress * 0.8 + 20); 
        document.getElementById('kpiScore').textContent = (progress === 0 ? 0 : score) + '점';

        this.updateFinanceChart(categorySums);
      },

      updateFinanceChart(categorySums) {
        const ctx = document.getElementById('financeChart').getContext('2d');
        if (app.financeChartInstance) app.financeChartInstance.destroy();
        
        const labels = Object.keys(categorySums).filter(k => categorySums[k] > 0);
        const data = labels.map(k => categorySums[k]);

        if(data.length === 0) return; 

        app.financeChartInstance = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: labels,
            datasets: [{
              data: data,
              backgroundColor: ['#f87171', '#60a5fa', '#fcd34d', '#34d399', '#a78bfa'],
              borderWidth: 0
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { position: 'right', labels: { boxWidth: 10, font: {size: 11} } } }
          }
        });
      },

      updateGrowthReport() {
        const todayStr = app.selectedDateStr;
        const yesterdayStr = app.getOffsetDateString(todayStr, 1);
        const lastWeekStr = app.getOffsetDateString(todayStr, 7);

        const pToday = (app.dailyData[todayStr] && app.dailyData[todayStr].progress) || 0;
        const pYest = (app.dailyData[yesterdayStr] && app.dailyData[yesterdayStr].progress) || 0;
        const pLast = (app.dailyData[lastWeekStr] && app.dailyData[lastWeekStr].progress) || 0;

        document.getElementById('reportToday').textContent = pToday + '%';
        document.getElementById('reportYesterday').textContent = pYest + '%';
        document.getElementById('reportLastWeek').textContent = pLast + '%';

        const fb = document.getElementById('growthFeedback');
        if (pToday === 0 && pYest === 0) {
          fb.innerHTML = "타임테이블을 완료하고 달성률을 높여보세요! 🚀"; fb.style.color = "var(--text-muted)"; fb.style.backgroundColor = "#f1f5f9";
        } else if (pToday > pYest) {
          fb.innerHTML = `어제보다 <b>${pToday - pYest}%</b> 성장! 이대로 계속 나아가요! 🤩🎉`; fb.style.color = "var(--success)"; fb.style.backgroundColor = "var(--success-bg)";
        } else if (pToday > 0 && pToday === pYest) {
          fb.innerHTML = `어제만큼 꾸준히 해내고 있어요! 🔥💪`; fb.style.color = "#0369a1"; fb.style.backgroundColor = "#e0f2fe";
        } else {
          fb.innerHTML = `무리하지 말고 작은 것부터 하나씩 완료해봐요! 🌱`; fb.style.color = "#b45309"; fb.style.backgroundColor = "#fef3c7";
        }

        const labels = [], dataPts = [];
        for(let i = 6; i >= 0; i--) {
          const dStr = app.getOffsetDateString(todayStr, i);
          const dObj = new Date(dStr);
          labels.push(`${dObj.getMonth() + 1}/${dObj.getDate()}`);
          dataPts.push((app.dailyData[dStr] && app.dailyData[dStr].progress) || 0);
        }

        const ctx = document.getElementById('growthChart').getContext('2d');
        if (app.growthChartInstance) app.growthChartInstance.destroy();

        app.growthChartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: '일일 달성률 (%)', data: dataPts, borderColor: '#818cf8', backgroundColor: 'rgba(129, 140, 248, 0.2)',
              borderWidth: 3, fill: true, tension: 0.4, pointBackgroundColor: '#f472b6', pointRadius: 5, pointBorderColor: '#fff', pointBorderWidth: 2
            }]
          },
          options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100, grid: { borderDash: [5, 5] } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
        });
      },

      renderCalendar() {
        const year = app.currentDate.getFullYear();
        const month = app.currentDate.getMonth();
        document.getElementById('currentMonthStr').textContent = `${year}년 ${month + 1}월`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const grid = document.getElementById('calendarDays');
        grid.innerHTML = '';
        
        for(let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;
        
        const today = new Date();
        for(let day = 1; day <= daysInMonth; day++) {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
          const dayOfWeek = new Date(year, month, day).getDay();
          
          let classes = "cal-day";
          let dateStyle = "";
          let extraHtml = "";

          if(dayOfWeek === 0) dateStyle = 'class="sun"';
          if(dayOfWeek === 6) dateStyle = 'class="sat"';
          if(year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) classes += " today";

          if (app.holidays[year] && app.holidays[year][dateStr]) {
            dateStyle = 'class="sun"';
            extraHtml += `<div class="holiday-text">🎈 ${app.holidays[year][dateStr]}</div>`;
          }

          app.events.filter(e => e.date === dateStr).forEach(e => {
            extraHtml += `<div class="event-text">🎉 ${e.title}</div>`;
          });
          
          if (app.dailyData[dateStr] && app.dailyData[dateStr].priorities && app.dailyData[dateStr].priorities[0]) {
             extraHtml += `<div class="priority-text">📌 ${app.dailyData[dateStr].priorities[0]}</div>`;
          }

          grid.innerHTML += `<div class="${classes}" onclick="app.ui.showPlanner('${dateStr}')"><span ${dateStyle}>${day}</span>${extraHtml}</div>`;
        }
      }
    }
  };

  document.addEventListener('DOMContentLoaded', () => app.init());
</script>

</body>
</html>
